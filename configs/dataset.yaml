# dataset.yaml — YOLO dataset configuration for Snow Pole Detection
#
# This file tells YOLOv8 where to find images and labels,
# and what classes to detect.
# Paths are relative to the project root (where you run train.py from)
path: /datasets/tdt4265/Poles2025/roadpoles_v1        # root data directory
train: train/images # training images (relative to 'path')
val: valid/images     # validation images (relative to 'path')

# Number of classes
nc: 1

# Class names (index 0 = pole)
names:
  0: pole
