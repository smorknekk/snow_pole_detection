#MODEL
model: yolov8s.pt

#DATA
dataset: /work/maxhm/snow_pole_detection/configs/dataset_iphone.yaml

#TRAIN
epochs: 167
batch_size: 16
image_size: 640
workers: 4

#OPTIMIZER
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

#AUG
augment: true

#OUTPUT
project: outputs
name: snow_pole_iphone_s
save_period: 10

device: ""  #auto-select
